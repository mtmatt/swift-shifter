<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preferences</title>
  <style>
    :root {
      --bg:           #0d0d10;
      --surface:      rgba(255,255,255,0.05);
      --border:       rgba(255,255,255,0.08);
      --border-hi:    rgba(255,255,255,0.14);
      --text:         rgba(255,255,255,0.90);
      --text-2:       rgba(255,255,255,0.45);
      --text-3:       rgba(255,255,255,0.22);
      --accent:       #a78bfa;
      --accent-dim:   rgba(167,139,250,0.12);
      --accent-glow:  rgba(167,139,250,0.35);
      --danger:       #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "SF Mono", "Menlo", "Cascadia Code", ui-monospace, monospace;
      font-size: 11px;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 22px 18px;
      user-select: none;
    }

    h1 {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 18px;
    }

    .sliders {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    label {
      font-size: 9.5px;
      color: var(--text-2);
      width: 36px;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    input[type="range"] {
      flex: 1;
      height: 2px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border-hi);
      border-radius: 1px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    input[type="range"]:hover::-webkit-slider-thumb,
    input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(1.2);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .val {
      font-size: 9px;
      color: var(--text-3);
      min-width: 26px;
      text-align: right;
      letter-spacing: 0.02em;
    }

    .footer {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-top: 16px;
      margin-top: auto;
      border-top: 0.5px solid var(--border);
    }

    #status {
      flex: 1;
      font-size: 8.5px;
      color: var(--danger);
      letter-spacing: 0.02em;
    }

    button {
      font-family: inherit;
      font-size: 9.5px;
      font-weight: 500;
      padding: 4px 14px;
      border-radius: 5px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.1s, box-shadow 0.1s;
    }

    #btn-cancel {
      background: transparent;
      border: 0.5px solid var(--border-hi);
      color: var(--text-2);
    }

    #btn-cancel:hover {
      border-color: var(--text-2);
      color: var(--text);
    }

    #btn-save {
      background: var(--accent);
      border: 0.5px solid var(--accent);
      color: #0d0d10;
      font-weight: 600;
    }

    #btn-save:hover {
      opacity: 0.88;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    #btn-save:active { opacity: 0.7; }
  </style>
</head>
<body>
  <h1>quality</h1>

  <div class="sliders">
    <div class="row">
      <label for="jpeg-q">jpeg</label>
      <input type="range" id="jpeg-q" min="1" max="100" value="75" />
      <span id="jpeg-q-val" class="val">75</span>
    </div>
    <div class="row">
      <label for="avif-q">avif</label>
      <input type="range" id="avif-q" min="1" max="100" value="65" />
      <span id="avif-q-val" class="val">65</span>
    </div>
  </div>

  <div class="footer">
    <span id="status"></span>
    <button id="btn-cancel">cancel</button>
    <button id="btn-save">save</button>
  </div>

  <script type="module" src="src/settings.ts"></script>
</body>
</html>
