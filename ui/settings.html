<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Preferences</title>
        <link rel="stylesheet" href="src/settings.css" />
    </head>
    <body>
        <div class="tab-bar">
            <button class="tab active" data-panel="image">image</button>
            <button class="tab" data-panel="engines">engines</button>
            <button class="tab" data-panel="output">output</button>
        </div>

        <div class="content">

            <!-- ── image ────────────────────────────────────────── -->
            <div class="panel active" id="panel-image">
                <div class="group">
                    <div class="row">
                        <label for="jpeg-q">jpeg</label>
                        <input type="range" id="jpeg-q" min="1" max="100" value="75" />
                        <span id="jpeg-q-val" class="val">75</span>
                    </div>
                    <div class="row">
                        <label for="avif-q">avif</label>
                        <input type="range" id="avif-q" min="1" max="100" value="65" />
                        <span id="avif-q-val" class="val">65</span>
                    </div>
                </div>
            </div>

            <!-- ── engines ──────────────────────────────────────── -->
            <div class="panel" id="panel-engines">
                <div class="group">
                    <h3 class="subheader">pdf</h3>
                    <div class="row">
                        <label for="use-marker">use marker</label>
                        <input type="checkbox" id="use-marker" />
                    </div>
                    <div class="row" id="marker-hint" hidden>
                        <span id="marker-status" class="hint"></span>
                        <button id="btn-install-marker" class="btn-inline" hidden>install</button>
                    </div>
                    <div id="marker-progress-wrap" hidden>
                        <div id="marker-progress-track">
                            <div id="marker-progress-fill"></div>
                        </div>
                    </div>

                    <h3 class="subheader">local llm</h3>
                    <div class="row">
                        <label for="use-llm">use ollama</label>
                        <input type="checkbox" id="use-llm" />
                    </div>
                    <div class="row" id="llm-hint" hidden>
                        <span id="llm-status" class="hint"></span>
                        <button id="btn-test-ollama" class="btn-inline" hidden>test</button>
                        <button id="btn-install-ollama" class="btn-inline" hidden>install / pull</button>
                    </div>
                    <div id="llm-progress-wrap" hidden>
                        <div id="marker-progress-track">
                            <div id="llm-progress-fill"></div>
                        </div>
                    </div>
                    <div class="row" id="llm-model-row" hidden>
                        <label for="llm-model">model</label>
                        <input type="text" id="llm-model" class="text-input" value="gemma4:e2b" list="llm-models-list" />
                        <datalist id="llm-models-list"></datalist>
                    </div>
                    <div class="row" id="llm-url-row" hidden>
                        <label for="llm-url">url</label>
                        <input type="text" id="llm-url" class="text-input" value="http://localhost:11434" />
                    </div>
                </div>
            </div>

            <!-- ── output ───────────────────────────────────────── -->
            <div class="panel" id="panel-output">
                <div class="group">
                    <div class="row">
                        <label for="clipboard-mode">paste output</label>
                        <select id="clipboard-mode" class="text-input">
                            <option value="clipboard">copy to clipboard</option>
                            <option value="download">download to file</option>
                        </select>
                    </div>
                    <div class="row">
                        <label for="max-c">workers</label>
                        <input type="range" id="max-c" min="1" max="8" value="4" />
                        <span id="max-c-val" class="val">4</span>
                    </div>
                </div>
            </div>

        </div>

        <footer>
            <span id="status"></span>
            <button id="btn-cancel">cancel</button>
            <button id="btn-save">save</button>
        </footer>

        <script type="module" src="src/settings.ts"></script>
    </body>
</html>
