<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Preferences</title>
        <link rel="stylesheet" href="src/settings.css" />
    </head>
    <body>
        <div class="content">
            <h2 class="section-label">quality</h2>
            <div class="group">
                <div class="row">
                    <label for="jpeg-q">jpeg</label>
                    <input
                        type="range"
                        id="jpeg-q"
                        min="1"
                        max="100"
                        value="75"
                    />
                    <span id="jpeg-q-val" class="val">75</span>
                </div>
                <div class="row">
                    <label for="avif-q">avif</label>
                    <input
                        type="range"
                        id="avif-q"
                        min="1"
                        max="100"
                        value="65"
                    />
                    <span id="avif-q-val" class="val">65</span>
                </div>
            </div>

            <div class="divider"></div>

            <h2 class="section-label">pdf</h2>
            <div class="group">
                <div class="row">
                    <label for="use-marker">use marker</label>
                    <input type="checkbox" id="use-marker" />
                </div>
                <div class="row" id="marker-hint" hidden>
                    <span id="marker-status" class="hint"></span>
                    <button id="btn-install-marker" class="btn-inline" hidden>install</button>
                </div>
                <div id="marker-progress-wrap" hidden>
                    <div id="marker-progress-track">
                        <div id="marker-progress-fill"></div>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <h2 class="section-label">concurrency</h2>
            <div class="group">
                <div class="row">
                    <label for="max-c">workers</label>
                    <input type="range" id="max-c" min="1" max="8" value="4" />
                    <span id="max-c-val" class="val">4</span>
                </div>
            </div>
        </div>

        <footer>
            <span id="status"></span>
            <button id="btn-cancel">cancel</button>
            <button id="btn-save">save</button>
        </footer>

        <script type="module" src="src/settings.ts"></script>
    </body>
</html>
