name: Tag

# Triggers on any push to the `release` branch and creates a v{version} tag
# from the version already in the version files (package.json / Cargo.toml /
# tauri.conf.json). Run `scripts/bump-version.sh <version>` locally, commit,
# and push to `release` to cut a release.
#
# Uses TAG_TOKEN (a PAT) so the pushed tag triggers the Release workflow —
# GITHUB_TOKEN pushes are intentionally blocked from triggering further workflows.
on:
  push:
    branches: [release]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # GITHUB_TOKEN is always available and sufficient for fetch/checkout.
      # TAG_TOKEN (a PAT) is used only for the push so that the resulting tag
      # event triggers the Release workflow — GITHUB_TOKEN pushes are blocked
      # from triggering further workflows.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to check existing tags

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Verify all version files agree
        run: |
          PKG=$(jq -r .version package.json)
          CARGO=$(grep -m1 '^version = ' swift-shifter/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          TAURI=$(jq -r .version swift-shifter/tauri.conf.json)

          if [[ "$PKG" != "$CARGO" || "$PKG" != "$TAURI" ]]; then
            echo "Version mismatch — run scripts/bump-version.sh to sync all files:"
            echo "  package.json:             $PKG"
            echo "  swift-shifter/Cargo.toml: $CARGO"
            echo "  tauri.conf.json:          $TAURI"
            exit 1
          fi

          echo "All version files agree: $PKG"

      - name: Create tag if it does not exist
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
          TAG_TOKEN: ${{ secrets.TAG_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to do."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            # Push via PAT so the tag event triggers the Release workflow.
            git push "https://x-access-token:${TAG_TOKEN}@github.com/${REPO}.git" "$TAG"
            echo "Created and pushed $TAG"
          fi
